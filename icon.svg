<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1DB368"/>
      <stop offset="100%" stop-color="#084D2E"/>
    </linearGradient>
    <radialGradient id="glow" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Plant illustration -->
  <g filter="url(#soft)">

    <!-- Stem -->
    <path d="M256 375 L256 192"
      stroke="white" stroke-width="26" stroke-linecap="round" fill="none" opacity="0.96"/>

    <!-- Left leaf — curves out from mid-stem to the left -->
    <path d="
      M 256 305
      C 244 286 212 268 164 278
      C 154 296 168 322 210 322
      C 234 322 250 314 256 305 Z"
      fill="white" opacity="0.95"/>

    <!-- Right leaf — curves out from upper stem to the right -->
    <path d="
      M 256 262
      C 268 243 300 225 348 235
      C 358 253 344 279 302 279
      C 278 279 262 271 256 262 Z"
      fill="white" opacity="0.95"/>

    <!-- Sprout tip — teardrop pointing up -->
    <path d="
      M 256 192
      C 272 180 282 160 272 140
      C 264 124 248 124 240 140
      C 230 160 240 180 256 192 Z"
      fill="white" opacity="0.97"/>

  </g>

  <!-- Soil dots -->
  <circle cx="196" cy="376" r="9"  fill="rgba(255,255,255,0.22)"/>
  <circle cx="224" cy="385" r="7"  fill="rgba(255,255,255,0.18)"/>
  <circle cx="256" cy="388" r="8"  fill="rgba(255,255,255,0.2)"/>
  <circle cx="288" cy="385" r="7"  fill="rgba(255,255,255,0.18)"/>
  <circle cx="316" cy="376" r="9"  fill="rgba(255,255,255,0.22)"/>
</svg>
